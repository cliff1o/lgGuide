name: Sync to GitCode

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitCode
        env:
          GITCODE_USERNAME: ${{ secrets.GITCODE_USERNAME }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GIT_TERMINAL_PROMPT: 0
        run: |
          set -euxo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 減少/延後 chunked upload
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
    
          USER_ENC=$(printf '%s' "$GITCODE_USERNAME" | jq -sRr @uri)
          TOKEN_ENC=$(printf '%s' "$GITCODE_TOKEN" | jq -sRr @uri)

          git remote remove gitcode 2>/dev/null || true
          git remote add gitcode "https://${USER_ENC}:${TOKEN_ENC}@gitcode.com/2301_79002849/lgGuide.git"

          echo "=== remotes ==="
          git remote -v

          echo "=== current branch ==="
          git branch --show-current || true

          echo "=== last commit ==="
          git log -1 --oneline

          echo "=== test remote access ==="
          git ls-remote gitcode

          echo "=== start push ==="
          git push --progress --verbose --force gitcode HEAD:main
