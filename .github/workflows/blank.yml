name: Sync to Gitee

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          USER_ENC=$(printf '%s' "$GITEE_USERNAME" | jq -sRr @uri)
          TOKEN_ENC=$(printf '%s' "$GITEE_TOKEN" | jq -sRr @uri)

          git remote remove gitee 2>/dev/null || true 
          git remote add gitee "https://${USER_ENC}:${TOKEN_ENC}@gitee.com/clifflo/lgresource.git"

          git push --force gitee HEAD:master
